name: CI

on:
  push:
  pull_request:

jobs:
  python-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check scripts
        run: python -m py_compile test_hid.py provision_hid.py get_state_hid.py regression_hid.py host_protocol.py tests/test_protocol.py
      - name: Run protocol tests
        run: python -m unittest tests.test_protocol -v
