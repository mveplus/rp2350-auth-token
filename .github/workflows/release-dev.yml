name: Release Dev Firmware

on:
  push:
    tags:
      - "dev-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to publish, for example dev-v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build-dev-release:
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            git \
            libnewlib-arm-none-eabi \
            ninja-build \
            python3

      - name: Fetch Pico SDK
        run: |
          git clone --depth 1 --branch 2.2.0 --recurse-submodules https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"

      - name: Configure dev build
        run: cmake -S . -B build_beta -G Ninja

      - name: Build dev firmware
        run: cmake --build build_beta

      - name: Prepare release assets
        id: assets
        run: |
          mkdir -p dist
          UF2_PATH="dist/rp2350_token-${RELEASE_TAG}-dev.uf2"
          ELF_PATH="dist/rp2350_token-${RELEASE_TAG}-dev.elf"
          SHA_PATH="dist/SHA256SUMS.txt"
          cp build_beta/rp2350_token.uf2 "$UF2_PATH"
          cp build_beta/rp2350_token.elf "$ELF_PATH"
          sha256sum dist/* > dist/SHA256SUMS.txt
          echo "uf2_path=$UF2_PATH" >> "$GITHUB_OUTPUT"
          echo "elf_path=$ELF_PATH" >> "$GITHUB_OUTPUT"
          echo "sha_path=$SHA_PATH" >> "$GITHUB_OUTPUT"

      - name: Show packaged assets
        run: ls -l dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ steps.assets.outputs.uf2_path }}
            ${{ steps.assets.outputs.elf_path }}
            ${{ steps.assets.outputs.sha_path }}
          generate_release_notes: true
          prerelease: true
          fail_on_unmatched_files: true
