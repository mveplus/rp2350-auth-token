name: Release Dev Firmware

on:
  push:
    tags:
      - "dev-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to publish, for example dev-v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build-dev-release:
    runs-on: ubuntu-latest
    env:
      PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            git \
            libnewlib-arm-none-eabi \
            ninja-build \
            python3

      - name: Fetch Pico SDK
        run: |
          git clone --depth 1 --branch 2.2.0 --recurse-submodules https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"

      - name: Configure dev build
        run: cmake -S . -B build_beta -G Ninja

      - name: Build dev firmware
        run: cmake --build build_beta

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp build_beta/rp2350_token.uf2 "dist/rp2350_token-${RELEASE_TAG}-dev.uf2"
          cp build_beta/rp2350_token.elf "dist/rp2350_token-${RELEASE_TAG}-dev.elf"
          sha256sum dist/* > dist/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            dist/rp2350_token-*-dev.uf2
            dist/rp2350_token-*-dev.elf
            dist/SHA256SUMS.txt
          generate_release_notes: true
          prerelease: true
